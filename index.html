<script>
function openModal(){
  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('moverlay').classList.remove('open');
  document.body.style.overflow='';
}
function overlayClick(e){
  if(e.target===document.getElementById('moverlay')) closeModal();
}

async function submitAccess(e){
  e.preventDefault();

  const name = document.getElementById('a-name').value.trim();
  const email = document.getElementById('a-email').value.trim();

  try{
    const res = await fetch('/api/request-access', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email })
    });

    const data = await res.json();

    if(!res.ok){
      alert("Error: " + (data.error || "Unknown error"));
      return;
    }

    document.getElementById('user-name').textContent=name;
    document.getElementById('access-form').style.display='none';
    document.getElementById('access-msg').style.display='block';

    setTimeout(function(){
      window.location.href='https://puvip.co/la-partners/Primesync';
    },2000);

  }catch(err){
    alert("Connection error");
  }
}

async function submitUID(e){
  e.preventDefault();

  const uid = document.getElementById('uid-f').value.trim();
  const email = document.getElementById('uid-e').value.trim();

  try{
    const res = await fetch('/api/request-access', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        name: "UID Submission",
        email: email,
        brokerId: uid
      })
    });

    const data = await res.json();

    if(!res.ok){
      alert("Error: " + (data.error || "Unknown error"));
      return;
    }

    document.getElementById('uid-form').style.display='none';
    document.getElementById('uid-msg').style.display='block';

  }catch(err){
    alert("Connection error");
  }
}

function toggleLang(){
  document.getElementById('langDrop').classList.toggle('open');
}

document.addEventListener('click',function(e){
  if(!document.getElementById('langWrap').contains(e.target))
    document.getElementById('langDrop').classList.remove('open');
});

function setLang(code,label){
  document.getElementById('langLabel').textContent=label;
  document.getElementById('langDrop').classList.remove('open');
  document.cookie='googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
  document.cookie='googtrans=/en/'+code+'; path=/';
  location.reload();
}

function googleTranslateElementInit(){
  new google.translate.TranslateElement({
    pageLanguage:'en',
    layout:google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay:false
  },'google_translate_element');
}

var obs=new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      en.target.classList.add('vis');
      obs.unobserve(en.target);
    }
  });
},{threshold:.1});

document.querySelectorAll('.fi-anim').forEach(function(el){
  obs.observe(el);
});
</script>
