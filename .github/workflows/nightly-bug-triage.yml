# ============================================================================
# SYSTM8 Nightly Bug Triage Agent
# ============================================================================
# Runs nightly at 02:00 UTC (and manual dispatch). Reads new bugs and failed
# tests from Supabase, generates Claude Code-ready prompts, and creates
# GitHub Issues labeled by severity so you can copy/paste each morning.
# ============================================================================

name: "SYSTM8 Nightly Bug Triage"

on:
  schedule:
    - cron: "0 2 * * *" # Every night at 02:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  TRIAGE_SECRET: ${{ secrets.TRIAGE_SECRET }}

jobs:
  # --------------------------------------------------------------------------
  # Step 0 — Ensure required GitHub labels exist
  # --------------------------------------------------------------------------
  ensure-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create triage labels (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          create_label() {
            local name="$1" color="$2" description="$3"
            gh label create "$name" \
              --repo "$REPO" \
              --color "$color" \
              --description "$description" \
              --force 2>/dev/null || true
          }

          create_label "bug-critical"  "d73a4a" "Critical severity bug — blocks core functionality"
          create_label "bug-major"     "e99d42" "Major severity bug — significant user impact"
          create_label "bug-minor"     "fbca04" "Minor severity bug — small user impact"
          create_label "bug-cosmetic"  "7b61ff" "Cosmetic bug — visual/UX polish"
          create_label "auto-triage"   "0075ca" "Automatically triaged by nightly agent"
          create_label "agent-ready"   "0e8a16" "Ready for Claude Code agent — prompt included"

  # --------------------------------------------------------------------------
  # Step 1 — Fetch, triage, and create issues
  # --------------------------------------------------------------------------
  triage:
    needs: ensure-labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Step 1 — Fetch data from Supabase and write to temp files
      # ----------------------------------------------------------------
      - name: Fetch bugs and test failures from Supabase
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Fetching new bug reports"
          BUGS=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/bug_reports?status=eq.new&platform=eq.systm8&select=id,title,severity,description" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json")
          echo "$BUGS" > /tmp/bugs.json
          echo "Fetched $(echo "$BUGS" | jq 'length') bug(s)"
          echo "::endgroup::"

          echo "::group::Fetching failed test results"
          FAILS=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/test_results?status=eq.fail&select=id,test_item,error_message,severity" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json")
          echo "$FAILS" > /tmp/fails.json
          echo "Fetched $(echo "$FAILS" | jq 'length') failure(s)"
          echo "::endgroup::"

      # ----------------------------------------------------------------
      # Step 2 — Process data and create GitHub Issues (Node)
      # ----------------------------------------------------------------
      - name: Triage bugs and create issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          node << 'NODESCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');

          // ---------------------------------------------------------------
          // Read fetched data from temp files
          // ---------------------------------------------------------------
          let bugs = [];
          let fails = [];
          try { bugs = JSON.parse(fs.readFileSync('/tmp/bugs.json', 'utf8')); } catch(e) { bugs = []; }
          try { fails = JSON.parse(fs.readFileSync('/tmp/fails.json', 'utf8')); } catch(e) { fails = []; }

          const REPO = process.env.GITHUB_REPOSITORY;
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_SERVICE_KEY = process.env.SUPABASE_SERVICE_KEY;

          // ---------------------------------------------------------------
          // Helper: guess likely file from keywords
          // ---------------------------------------------------------------
          function guessFile(text) {
            const t = (text || '').toLowerCase();
            if (/landing|slug/.test(t))       return 'app/[slug]/page.tsx';
            if (/email|mail/.test(t))         return 'app/api/ (email routes)';
            if (/login|signup/.test(t))       return 'app/login/page.tsx';
            if (/bio|groq/.test(t))           return 'app/api/generate-bio/route.ts';
            if (/share/.test(t))              return 'app/page.tsx (share section)';
            if (/language|translat/.test(t))  return 'translations in relevant page files';
            return 'app/page.tsx';
          }

          // ---------------------------------------------------------------
          // Helper: build Claude Code prompt
          // ---------------------------------------------------------------
          function buildPrompt(title, severity, description, likelyFile) {
            return `## Claude Code Agent Prompt

          **Bug:** ${title}
          **Severity:** ${severity}
          **Likely file:** ${likelyFile}

          ### Description
          ${description}

          ### Fix Instructions
          1. Open \`${likelyFile}\` and locate the code related to: ${title}
          2. Reproduce the issue by reading the logic path described above.
          3. Implement the fix — keep it minimal and targeted.
          4. **Constraints (MUST follow):**
             - Do NOT break any existing functionality.
             - Support all 9 languages (no, en, es, fr, de, pt, zh, ar, hi).
             - Maintain the dark/gold theme throughout.
             - Preserve mobile responsiveness on all viewports.
          5. Run the build (\\\`npm run build\\\`) and verify zero errors.
          6. If tests exist for the affected area, run them and confirm they pass.

          > Copy this entire prompt into Claude Code to begin the fix.`;
          }

          // ---------------------------------------------------------------
          // Helper: check if an open issue with exact title already exists
          // ---------------------------------------------------------------
          function issueExists(title) {
            try {
              const out = execSync(
                `gh issue list --repo "${REPO}" --state open --search "${title.replace(/"/g, '\\"')}" --json title`,
                { encoding: 'utf8' }
              );
              const issues = JSON.parse(out);
              return issues.some(i => i.title === title);
            } catch {
              return false;
            }
          }

          // ---------------------------------------------------------------
          // Helper: create a GitHub issue
          // ---------------------------------------------------------------
          function createIssue(title, body, labels) {
            const tmpBody = '/tmp/issue_body.md';
            fs.writeFileSync(tmpBody, body);
            execSync(
              `gh issue create --repo "${REPO}" --title "${title.replace(/"/g, '\\"')}" --body-file "${tmpBody}" --label "${labels}"`,
              { stdio: 'inherit' }
            );
          }

          // ---------------------------------------------------------------
          // Helper: PATCH a Supabase row
          // ---------------------------------------------------------------
          function supabasePatch(table, query, body) {
            try {
              execSync(`curl -sf -X PATCH \
                "${SUPABASE_URL}/rest/v1/${table}?${query}" \
                -H "apikey: ${SUPABASE_SERVICE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d '${JSON.stringify(body)}'`, { stdio: 'inherit' });
            } catch { /* best-effort */ }
          }

          // ---------------------------------------------------------------
          // 1. Process bug reports
          // ---------------------------------------------------------------
          let created = 0;
          let skipped = 0;

          console.log(`\n--- Processing ${bugs.length} bug report(s) ---`);
          for (const bug of bugs) {
            const title = `[BUG] ${bug.title}`;
            const severity = bug.severity || 'minor';
            const description = bug.description || 'No description provided.';
            const likelyFile = guessFile(`${bug.title} ${description}`);

            if (issueExists(title)) {
              console.log(`Skipping duplicate: ${title}`);
              skipped++;
              continue;
            }

            const body = buildPrompt(bug.title, severity, description, likelyFile);
            createIssue(title, body, `bug-${severity},auto-triage,agent-ready`);
            console.log(`Created issue: ${title}`);
            created++;

            supabasePatch('bug_reports', `id=eq.${bug.id}`, { status: 'triaging' });
          }

          // ---------------------------------------------------------------
          // 2. Group test failures by test_item
          // ---------------------------------------------------------------
          const groups = {};
          for (const f of fails) {
            const key = f.test_item || 'unknown';
            if (!groups[key]) {
              groups[key] = { test_item: key, severity: f.severity || 'minor', count: 0, errors: new Set(), ids: [] };
            }
            groups[key].count++;
            if (f.error_message) groups[key].errors.add(f.error_message);
            groups[key].ids.push(f.id);
          }

          const grouped = Object.values(groups);
          console.log(`\n--- Processing ${grouped.length} grouped test failure(s) ---`);

          for (const g of grouped) {
            const title = `[TEST FAIL] ${g.test_item}`;
            const severity = g.severity;
            const errors = [...g.errors].join('\n- ');
            const description = `**${g.count} failure(s)** in test item \`${g.test_item}\`.\n\n**Error(s):**\n- ${errors}`;
            const likelyFile = guessFile(`${g.test_item} ${errors}`);

            if (issueExists(title)) {
              console.log(`Skipping duplicate: ${title}`);
              skipped++;
              continue;
            }

            const body = buildPrompt(g.test_item, severity, description, likelyFile);
            createIssue(title, body, `bug-${severity},auto-triage,agent-ready`);
            console.log(`Created issue: ${title}`);
            created++;
          }

          // ---------------------------------------------------------------
          // Summary
          // ---------------------------------------------------------------
          console.log(`
          ========================================
           SYSTM8 Nightly Triage Complete
          ========================================
           Bugs fetched:       ${bugs.length}
           Test groups:        ${grouped.length}
           Issues created:     ${created}
           Duplicates skipped: ${skipped}
          ========================================`);
          NODESCRIPT
